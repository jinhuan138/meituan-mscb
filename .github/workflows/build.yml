name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 1: 安装 openconnect（macOS 默认不带）────────────────
      - name: Install openconnect
        run: brew install openconnect

      # ── Step 2: 连接内网 VPN ──────────────────────────────────────
      - name: Connect to FortiClient VPN
        run: |
          echo "${{ secrets.VPN_PASSWORD }}" | sudo openconnect \
            --user=${{ secrets.VPN_USER }} \
            --passwd-on-stdin \
            --authgroup=duanxin \
            --background \
            --no-dtls \
            ${{ secrets.VPN_HOST }}
          sleep 8
          echo "VPN connected"

      # ── Step 3: 安装 Node.js ──────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── Step 4: 安装 mscb-cli（走内网 npm 源）─────────────────────
      - name: Install mscb-cli
        run: |
          npm install -g @hfe/mscb-cli --registry=http://r.npm.sankuai.com

      # ── Step 5: 验证安装 ──────────────────────────────────────────
      - name: Verify mscb-cli installation
        run: |
          mscb-cli -v
          mscb-cli --help
